services:
  postgres:
    image: postgres:16-alpine
    container_name: boards-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-boards}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-boards}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boards-network

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: boards-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOST: "0.0.0.0"
      DOCKER: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-boards}
      JWT_SECRET: ${JWT_SECRET}
      JWT_LIFETIME: ${JWT_LIFETIME:-15m}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - app_public:/app/public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boards-network

volumes:
  postgres_data:
  app_public:

networks:
  boards-network:
    driver: bridge
